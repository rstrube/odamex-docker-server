services:
  odamex:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REPO_TAG: ${ODAMEX_VERSION:-12.2.1}
    container_name: odamex
    restart: unless-stopped
    # Run as the image's built-in ubuntu user (UID/GID 1000). Override in
    # .env if your host user isn't 1000, so bind-mounted files stay
    # correctly owned. No root, no gosu — the container never runs as root.
    user: "${ODAMEX_UID:-1000}:${ODAMEX_GID:-1000}"
    # Raw UDP — bypasses Caddy entirely, same as the Minecraft pattern.
    # Router needs a matching UDP 10666 forward -> 192.168.1.201.
    ports:
      - "10666:10666/udp"
    volumes:
      - ./wads:/wads:ro
      - ./configs:/configs:ro
      - ./odahome:/home/ubuntu/.odamex
    command: >
      -iwad /wads/DOOM2.WAD
      -waddir /wads
      +exec /configs/${ODAMEX_CONFIG:-config.cfg}