services:
  odamex:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REPO_TAG: ${ODAMEX_VERSION:-12.2.1}
    container_name: odamex
    restart: unless-stopped
    ports:
      - "10666:10666/udp"
    environment:
      - ODAMEX_UID=${ODAMEX_UID:-1000}
      - ODAMEX_GID=${ODAMEX_GID:-1000}
      - ODAMEX_CONFIG=${ODAMEX_CONFIG:-config.cfg}
    volumes:
      - ./wads:/wads:ro
      - ./configs:/configs:ro
      - ./odahome:/home/doomguy/.odamex
    command: >
      -iwad /wads/DOOM2.WAD
      -waddir /wads
      +exec /configs/${ODAMEX_CONFIG}