// ---------------------------------------------------------------------
// Odamex dedicated server — minimal example config
// MAP01 (Entryway), Deathmatch, up to 8 players
//
// Load with:  odasrv -iwad DOOM2.WAD +exec example.cfg
// (1 = on, 0 = off for boolean cvars)
// ---------------------------------------------------------------------

// --- Server identity ---
set sv_hostname "Entryway Deathmatch"
set sv_motd "Welcome to MAP01 DM!"

// --- Networking ---
set sv_upnp "0"

// --- Game mode ---
// 0 = Cooperative, 1 = Deathmatch, 2 = Team DM, 3 = CTF
set sv_gametype "1"

// --- Player slots ---
// maxplayers = how many can actively play (spawn and frag)
// maxclients = total connections allowed, including spectators
// Keep maxclients >= maxplayers so spectators don't eat play slots.
set sv_maxplayers "8"
set sv_maxclients "10"

// --- Match limits (a match ends when either is hit; 0 disables one) ---
set sv_fraglimit "30"
set sv_timelimit "10"

// --- Basic deathmatch feel ---
set sv_skill "4"          // affects item/ammo placement in some maps
set sv_nomonsters "1"     // no monsters in DM
set sv_weaponstay "1"     // picked-up weapons stay for others
set sv_itemsrespawn "1"   // items respawn after being grabbed

// --- Security ---
// Change this before exposing the server publicly.
set rcon_password "CHANGE_ME"

// --- Start the map ---
// Jumps the server straight to Entryway when this config is exec'd.
map MAP01